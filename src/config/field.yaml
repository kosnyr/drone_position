# ═══════════════════════════════════════════════════════════════════════════════
# КОНФИГУРАЦИЯ ПОЛЯ
# ═══════════════════════════════════════════════════════════════════════════════
#
# Поле: 4.231м × 4.231м (от левого нижнего угла маркера 135 до правого верхнего угла маркера 159)
# Маркеры: ID 135-159 (25 маркеров)
# Расположение: сетка 5×5 с шагом 1м между центрами
# Размер маркеров: 21.3×21.3 см (0.213м)
#
# Схема поля (вид сверху):
# Начало координат (0,0,0) - левый нижний угол маркера 135
#
#        Y (вперед)
#        ↑
#        │
# 4.231м ┌─────┬─────┬─────┬─────┬─────┐
#        │ 155 │ 156 │ 157 │ 158 │ 159 │
# 3.231м ├─────┼─────┼─────┼─────┼─────┤
#        │ 150 │ 151 │ 152 │ 153 │ 154 │
# 2.231м ├─────┼─────┼─────┼─────┼─────┤
#        │ 145 │ 146 │ 147 │ 148 │ 149 │
# 1.231м ├─────┼─────┼─────┼─────┼─────┤
#        │ 140 │ 141 │ 142 │ 143 │ 144 │
# 0.231м ├─────┼─────┼─────┼─────┼─────┤
#        │ 135 │ 136 │ 137 │ 138 │ 139 │
# 0.0м   └─────┴─────┴─────┴─────┴─────┘──→ X (вправо)
#       0.0м 0.231м 1.231м 2.231м 3.231м 4.231м
#        ↑
#    (0,0,0) - левый нижний угол маркера 135
#
# Расчет координат центров:
# - Левый нижний угол маркера 135 = (0, 0)
# - Центр маркера 135 = (0.1065, 0.1065)  [половина размера маркера]
# - Шаг между центрами = 1.0м
# - Центр маркера 136 = 0.1065 + 1.0 = 1.1065м
# - И так далее...
#
# ═══════════════════════════════════════════════════════════════════════════════

# Размеры поля (от угла маркера 135 до угла маркера 159)
field_width: 4.231   # метров (4 шага по 1м + размер маркера 0.231м)
field_height: 4.231  # метров
grid_step: 1.0       # метров (расстояние между центрами маркеров)

# Параметры маркеров
marker_size: 0.213   # метров (21.3×21.3 см)
marker_origin: "corner"  # "corner" - координаты указаны для левого нижнего угла маркера 135

# Маркеры поля
# Координаты указаны для центров маркеров
# Расчет: центр первого маркера = 0.1065м (половина размера), затем шаг 1.0м
markers:
  # Ряд 0 (y=0.1065м) - НИЖНИЙ РЯД
  - id: 135
    position: {x: 0.1065, y: 0.1065, z: 0.0}
    description: "Угол: левый нижний (начало координат)"
  
  - id: 136
    position: {x: 1.1065, y: 0.1065, z: 0.0}
  
  - id: 137
    position: {x: 2.1065, y: 0.1065, z: 0.0}
    description: "Центр нижней стороны"
  
  - id: 138
    position: {x: 3.1065, y: 0.1065, z: 0.0}
  
  - id: 139
    position: {x: 4.1065, y: 0.1065, z: 0.0}
    description: "Угол: правый нижний"
  
  # Ряд 1 (y=1.1065м)
  - id: 140
    position: {x: 0.1065, y: 1.1065, z: 0.0}
  
  - id: 141
    position: {x: 1.1065, y: 1.1065, z: 0.0}
  
  - id: 142
    position: {x: 2.1065, y: 1.1065, z: 0.0}
  
  - id: 143
    position: {x: 3.1065, y: 1.1065, z: 0.0}
  
  - id: 144
    position: {x: 4.1065, y: 1.1065, z: 0.0}
  
  # Ряд 2 (y=2.1065м) - ЦЕНТРАЛЬНЫЙ РЯД
  - id: 145
    position: {x: 0.1065, y: 2.1065, z: 0.0}
    description: "Центр левой стороны"
  
  - id: 146
    position: {x: 1.1065, y: 2.1065, z: 0.0}
  
  - id: 147
    position: {x: 2.1065, y: 2.1065, z: 0.0}
    description: "ЦЕНТР ПОЛЯ"
  
  - id: 148
    position: {x: 3.1065, y: 2.1065, z: 0.0}
  
  - id: 149
    position: {x: 4.1065, y: 2.1065, z: 0.0}
    description: "Центр правой стороны"
  
  # Ряд 3 (y=3.1065м)
  - id: 150
    position: {x: 0.1065, y: 3.1065, z: 0.0}
  
  - id: 151
    position: {x: 1.1065, y: 3.1065, z: 0.0}
  
  - id: 152
    position: {x: 2.1065, y: 3.1065, z: 0.0}
  
  - id: 153
    position: {x: 3.1065, y: 3.1065, z: 0.0}
  
  - id: 154
    position: {x: 4.1065, y: 3.1065, z: 0.0}
  
  # Ряд 4 (y=4.1065м) - ВЕРХНИЙ РЯД
  - id: 155
    position: {x: 0.1065, y: 4.1065, z: 0.0}
    description: "Угол: левый верхний"
  
  - id: 156
    position: {x: 1.1065, y: 4.1065, z: 0.0}
  
  - id: 157
    position: {x: 2.1065, y: 4.1065, z: 0.0}
    description: "Центр верхней стороны"
  
  - id: 158
    position: {x: 3.1065, y: 4.1065, z: 0.0}
  
  - id: 159
    position: {x: 4.1065, y: 4.1065, z: 0.0}
    description: "Угол: правый верхний"
