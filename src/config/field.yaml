    position: {x: 2.0, y: 0.0, z: 0.0}
    description: "Центр нижней стороны"
  
  - id: 138
    position: {x: 3.0, y: 0.0, z: 0.0}
  
  - id: 139
    position: {x: 4.0, y: 0.0, z: 0.0}
    description: "Угол: правый нижний"
  
  # Ряд 2 (y=1м)
