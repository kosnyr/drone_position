# ═══════════════════════════════════════════════════════════════════════════════
# КОНФИГУРАЦИЯ ПОЛЯ 5×5 МЕТРОВ
# ═══════════════════════════════════════════════════════════════════════════════
#
# Поле: 5м × 5м
# Маркеры: ID 135-159 (25 маркеров)
# Расположение: сетка 5×5 с шагом 1м
# Размер маркеров: 20×20 см
#
# Схема поля (вид сверху):
# Начало координат (0,0,0) - левый нижний угол физического края поля
#
#        Y (вперед)
#        ↑
#        │
# 5.0м   ┌─────┬─────┬─────┬─────┬─────┐
#        │ 155 │ 156 │ 157 │ 158 │ 159 │
# 4.0м   ├─────┼─────┼─────┼─────┼─────┤
#        │ 150 │ 151 │ 152 │ 153 │ 154 │
# 3.0м   ├─────┼─────┼─────┼─────┼─────┤
#        │ 145 │ 146 │ 147 │ 148 │ 149 │
# 2.0м   ├─────┼─────┼─────┼─────┼─────┤
#        │ 140 │ 141 │ 142 │ 143 │ 144 │
# 1.0м   ├─────┼─────┼─────┼─────┼─────┤
#        │ 135 │ 136 │ 137 │ 138 │ 139 │
# 0.0м   └─────┴─────┴─────┴─────┴─────┘──→ X (вправо)
#       0.0м  1.0м  2.0м  3.0м  4.0м  5.0м
#        ↑
#    (0,0,0) - левый нижний угол физического края поля
#
# ═══════════════════════════════════════════════════════════════════════════════

# Размеры поля
field_width: 5.0   # метров
field_height: 5.0  # метров
grid_step: 1.213   # метров (расстояние между центрами маркеров: 0.213м + 1.0м зазор)

# Параметры маркеров
marker_size: 0.213   # метров (21.3×21.3 см)
marker_origin: "center"  # "center" - центр маркера (координаты указаны для центров)

# Маркеры поля
# Координаты указаны для центров маркеров относительно левого нижнего угла поля
# Расчет: первый маркер на 0.1065м от края, затем шаг 1.213м между центрами
