# ═══════════════════════════════════════════════════════════════════════════════
# КОНФИГУРАЦИЯ ПОЛЯ 5×5 МЕТРОВ
# ═══════════════════════════════════════════════════════════════════════════════
#
# Поле: 5м × 5м
# Маркеры: ID 135-159 (25 маркеров)
# Расположение: сетка 5×5 с шагом 1м
# Размер маркеров: 20×20 см
#
# Схема поля (вид сверху):
#
#     0м    1м    2м    3м    4м
#   ┌─────┬─────┬─────┬─────┬─────┐
# 0м│ 135 │ 136 │ 137 │ 138 │ 139 │
#   ├─────┼─────┼─────┼─────┼─────┤
# 1м│ 140 │ 141 │ 142 │ 143 │ 144 │
#   ├─────┼─────┼─────┼─────┼─────┤
# 2м│ 145 │ 146 │ 147 │ 148 │ 149 │
#   ├─────┼─────┼─────┼─────┼─────┤
# 3м│ 150 │ 151 │ 152 │ 153 │ 154 │
#   ├─────┼─────┼─────┼─────┼─────┤
# 4м│ 155 │ 156 │ 157 │ 158 │ 159 │
#   └─────┴─────┴─────┴─────┴─────┘
#
# ═══════════════════════════════════════════════════════════════════════════════

# Размеры поля
field_width: 5.0   # метров
field_height: 5.0  # метров
grid_step: 1.0     # метров (расстояние между маркерами)

# Маркеры поля
markers:
  # Ряд 1 (y=0м)
