# fisheye Kannala-Brandt  RMS=2.5561 px

image_width: 640
image_height: 480
camera_name: fisheye_camera
distortion_model: equidistant

target_width: 640
target_height: 480

# ═══════════════════════════════════════════════════════════════════════════════
# КАЛИБРОВКА СМЕЩЕНИЯ ДАТЧИКОВ
# ═══════════════════════════════════════════════════════════════════════════════
# Физическое расположение датчиков относительно центра дрона (body frame)
# Система координат body frame: X=forward, Y=right, Z=down
# 
# ВАЖНО: Измерьте реальные значения для вашего дрона!
# Текущие значения - примерные, требуют калибровки на реальном оборудовании.
#
# Как измерить:
# 1. Найдите центр масс дрона (точка пересечения диагоналей)
# 2. Измерьте расстояние от центра до оптического центра камеры
# 3. Измерьте расстояние от центра до точки измерения дальномера
# 4. Учитывайте знаки: +X вперед, +Y вправо, +Z вниз
# ═══════════════════════════════════════════════════════════════════════════════

sensor_offsets:
  # Смещение камеры относительно центра дрона (метры)
  camera_to_body:
    x: 0.00   # вперед/назад (положительное = вперед)
    y: 0.0554   # влево/вправо (положительное = вправо)
    z: 0.00   # вверх/вниз (положительное = вниз)
  
  # Смещение дальномера относительно центра дрона (метры)
  rangefinder_to_body:
    x: 0.00   # вперед/назад
    y: 0.00   # влево/вправо
    z: 0.00   # вверх/вниз
  
  # Включить компенсацию смещения (true/false)
  # Установите в false для отладки или если датчики в одной точке
  enable_offset_compensation: true
  
  # Включить компенсацию наклона при использовании высоты дальномера
  # При наклоне дрона дальномер измеряет расстояние не строго вертикально
  enable_tilt_compensation: true

distortion_coefficients:
  rows: 1
  cols: 4
  data: [-0.015795, -0.065551, 0.062975, -0.018554]

camera_matrix:
  rows: 3
  cols: 3
  data: [310.17777,   0.55347, 297.52978,
           0.     , 310.92139, 251.81362,
           0.     ,   0.     ,   1.     ]

rectification_matrix:
  rows: 3
  cols: 3
  data: [1., 0., 0.,
         0., 1., 0.,
         0., 0., 1.]

projection_matrix:
  rows: 3
  cols: 4
  data: [310.17777,   0.55347, 297.52978,   0.     ,
           0.     , 310.92139, 251.81362,   0.     ,
           0.     ,   0.     ,   1.     ,   0.     ]
